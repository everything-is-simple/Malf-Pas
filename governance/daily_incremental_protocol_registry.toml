[[invariants]]
id = "DAILY-INCREMENTAL-MANIFEST-FIRST"
value = true
description = "Daily incremental impact must be derived from source manifest and dirty scope."

[[invariants]]
id = "DIRTY-SCOPE-REPLAYS-FROM-EARLIEST-AFFECTED-DATE"
value = true
description = "Dirty scope must replay from the earliest affected date instead of only the dirty day."

[[invariants]]
id = "CHECKPOINT-BINDS-DIRTY-SCOPE"
value = true
description = "Checkpoint must bind dirty scope, manifest, schema, rule, and lineage."

[[invariants]]
id = "RESUME-CANNOT-SKIP-BLOCKED-UPSTREAM"
value = true
description = "Resume cannot skip blocked upstream, failed audit, or lineage gaps."

[[invariants]]
id = "STAGING-PROMOTE-REQUIRES-AUDIT-PASSED"
value = true
description = "Working facts can only promote after audit passed and complete lineage proof."

[[invariants]]
id = "NO-FORMAL-DB-MUTATION"
value = true
description = "Governance-only stage cannot write formal DB or formal data roots."
