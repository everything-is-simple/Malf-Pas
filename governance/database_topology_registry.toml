[[invariants]]
id = "HISTORICAL-LEDGER-ONE-LOGICAL-LEDGER"
value = true
description = "The system must be governed as one logical historical ledger with multiple sub-ledgers."

[[invariants]]
id = "COMMON-GOVERNANCE-KEYS-REQUIRED"
value = true
description = "Future sub-ledgers must reserve the common governance keys."

[[invariants]]
id = "SOURCE-MANIFEST-REQUIRED"
value = true
description = "Source facts and derived ledgers must bind to a source manifest."

[[invariants]]
id = "RUN-LINEAGE-REQUIRED"
value = true
description = "Derived facts must preserve run_id and source_run_id lineage."

[[invariants]]
id = "NO-CROSS-DB-ATOMICITY-ASSUMPTION"
value = true
description = "Cross-ledger consistency depends on lineage, manifest, and audit rather than implicit cross-DB transactions."

[[invariants]]
id = "NO-FORMAL-DB-MUTATION"
value = true
description = "Governance-only stage cannot write formal DuckDB, SQLite, db, parquet, or sqlite artifacts."
