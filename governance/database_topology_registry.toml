registry_version = "2026-05-15.v1"
stage = "governance-only"
formal_root = "H:/Malf-Pas-data"
validated_root = "H:/Asteria-Validated"
read_only_reference_root = "H:/Asteria-data"
formal_db_mutation = "no"
broker_feasibility = "deferred"
topology_status = "frozen-by-historical-ledger-topology-protocol-card-20260515-01"
authority_doc = "docs/01-architecture/05-historical-ledger-topology-protocol-v1.md"
released_formal_dbs = []
runtime_authorized = false
schema_migration_authorized = false
cross_db_atomicity_assumption_allowed = false

common_governance_keys = [
    "symbol",
    "timeframe",
    "bar_dt",
    "trade_dt",
    "plan_dt",
    "run_id",
    "source_run_id",
    "schema_version",
    "rule_version",
    "source_manifest_hash",
    "checkpoint_key",
]

required_manifest_fields = [
    "manifest_id",
    "source_manifest_hash",
    "source_root",
    "provider_role",
    "dataset_scope",
    "input_version",
    "schema_version",
    "generated_by_run_id",
    "audit_status",
]

retained_gaps = [
    "formal DB topology implementation",
    "daily incremental protocol",
    "dirty scope algorithm",
    "checkpoint and resume implementation",
    "staging promote implementation",
    "runner contract",
]

